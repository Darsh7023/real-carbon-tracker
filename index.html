<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EcoPulse Pro</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
<h1>🌱 EcoPulse Pro</h1>
<select id="mobility" aria-label="Mobility"><option value="0.8">Walking/Cycling</option><option value="7.5">Private Car</option></select>
<select id="electricity" aria-label="Electricity"><option value="1.2">Low</option><option value="6.8">High</option></select>
<select id="diet" aria-label="Diet"><option value="1.5">Vegetarian</option><option value="5.9">Non Vegetarian</option></select>
<button onclick="runAnalysis()">Calculate</button>
<h2 id="score"></h2>
<progress id="progress" max="20" value="0"></progress>
<ul id="history"></ul>
</div>
<script src="script.js"></script>
</body></html>
